name: ci

on:
  push:
  pull_request:

jobs:
  fast-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Unit and smoke
        run: uv run pytest -m "unit or smoke"

  packaging:
    runs-on: ubuntu-latest
    needs: fast-path
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev --frozen
      - name: Build package
        run: uv build
      - name: Distribution validation
        run: uv run pytest -m distribution
