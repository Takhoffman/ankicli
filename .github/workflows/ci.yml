name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-path:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Unit and smoke
        env:
          PYTEST_PLUGINS: ankicli.pytest_plugin
        run: uv run pytest -c pyproject.toml -m "unit or smoke" --proof-report .artifacts/proof-fast.json
      - name: Proof matrix audit
        continue-on-error: true
        run: uv run python scripts/audit_quality_matrix.py --proof-report .artifacts/proof-fast.json
      - name: Upload proof reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-fast-${{ matrix.os }}
          path: .artifacts/*.json
          if-no-files-found: ignore

  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev --frozen
      - name: Fixture integration
        env:
          PYTEST_PLUGINS: ankicli.pytest_plugin
        run: uv run pytest -c pyproject.toml tests/integration/test_python_anki_backend.py --proof-report .artifacts/proof-fixture.json
      - name: Editable entrypoint e2e
        env:
          PYTEST_PLUGINS: ankicli.pytest_plugin
        run: uv run pytest -c pyproject.toml tests/e2e/test_cli_e2e.py --proof-report .artifacts/proof-e2e.json
      - name: Upload proof reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-contract
          path: .artifacts/*.json
          if-no-files-found: ignore

  packaging:
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: [fast-path, contract]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync --extra dev --frozen
      - name: Build package
        run: uv build
      - name: Distribution validation
        run: uv run pytest -m distribution

  site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fast-path
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install site deps
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
