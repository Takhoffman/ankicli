name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate release version
        run: python3 scripts/validate_release_version.py --tag "$GITHUB_REF_NAME"

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-x64
            runs-on: macos-15-intel
          - target: darwin-arm64
            runs-on: macos-14
          - target: linux-x64
            runs-on: ubuntu-latest
          - target: windows-x64
            runs-on: windows-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Install build deps
        run: uv sync --extra dev --frozen
      - name: Build standalone artifact
        shell: bash
        run: uv run python scripts/build_release_artifact.py --target ${{ matrix.target }} --version "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/release/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true
      - name: Consolidate checksums
        run: |
          mkdir -p release-final
          find release-artifacts -type f ! -name '*checksums.txt' -exec cp {} release-final/ \;
          cat release-artifacts/*checksums.txt > release-final/ankicli-${GITHUB_REF_NAME#v}-checksums.txt
      - name: Publish GitHub Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-final/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-final/* --generate-notes --verify-tag
          fi

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
      - name: Build Python distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
