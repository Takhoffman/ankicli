    backend_scope: both
    risk: read
    required_proofs: [unit, cli_contract]
    not_applicable_proofs: [safety, parity]
  - command: doctor.backend
    backend_scope: both
    risk: read
    required_proofs: *read_basic
    not_applicable_proofs: [safety]
  - command: doctor.capabilities
    backend_scope: both
    risk: read
    required_proofs: *read_basic
    not_applicable_proofs: [safety]
  - command: doctor.collection
    backend_scope: python-anki
    risk: read
    required_proofs: *read_basic
    not_applicable_proofs: [parity, real_ankiconnect, safety]
  - command: doctor.safety
    backend_scope: python-anki
    risk: read
    required_proofs: *read_basic
    not_applicable_proofs: [parity, real_ankiconnect, safety]

