version: 1
phase: phase1

proof_sets:
  read_basic: &read_basic [unit, cli_contract, failure]
  read_shared: &read_shared [unit, cli_contract, fixture_integration, failure, parity]
  read_py_real: &read_py_real [unit, cli_contract, failure, real_python_anki]
  write_basic: &write_basic [unit, cli_contract, failure, safety]
  write_shared: &write_shared [unit, cli_contract, fixture_integration, failure, safety, parity]
  write_py: &write_py [unit, cli_contract, fixture_integration, failure, safety]
  sync_status: &sync_status [unit, cli_contract, failure, real_python_anki]
  sync_write: &sync_write [unit, cli_contract, failure, safety, real_python_anki]

commands:
